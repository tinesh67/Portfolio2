<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tinesh Devakumar \u2014 Mechanical Engineer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --cream: #eeeae2;
    --cream-dark: #e5e0d6;
    --white: #fafaf8;
    --ink: #18181a;
    --ink-mid: #3d3d40;
    --ink-light: #7a7a7d;
    --teal: #25607a;
    --teal-light: #ddeaf0;
    --teal-mid: #4a8fa8;
    --gold: #b8935a;
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--cream);
    color: var(--ink);
    font-family: var(--font-body);
    font-weight: 400;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 5vw;
    height: 64px;
    background: var(--cream);
    border-bottom: 1px solid rgba(0,0,0,0.08);
    transition: box-shadow 0.3s;
  }
  nav.scrolled { box-shadow: 0 2px 20px rgba(0,0,0,0.07); }
  .nav-logo {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 1.2rem;
    color: var(--ink);
    text-decoration: none;
  }
  .nav-links {
    display: flex;
    gap: 2.5rem;
    list-style: none;
    align-items: center;
  }
  .nav-links a {
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-light);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--teal); }
  .nav-cta {
    font-size: 0.78rem !important;
    font-weight: 500 !important;
    letter-spacing: 0.08em !important;
    color: var(--white) !important;
    background: var(--ink);
    padding: 0.5rem 1.2rem;
    border-radius: 100px;
    transition: background 0.2s, transform 0.15s !important;
  }
  .nav-cta:hover { background: var(--teal) !important; transform: translateY(-1px) !important; color: var(--white) !important; }

  /* HERO */
  #hero {
    min-height: 100vh;
    padding: 64px 5vw 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    align-items: center;
    gap: 4rem;
    position: relative;
    overflow: hidden;
  }
  .hero-bg-text {
    position: absolute;
    bottom: -2vw;
    left: 5vw;
    font-family: var(--font-display);
    font-size: 22vw;
    font-weight: 700;
    color: rgba(0,0,0,0.035);
    line-height: 1;
    pointer-events: none;
    user-select: none;
    white-space: nowrap;
  }
  .hero-content { position: relative; z-index: 1; }
  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    border: 1.5px solid var(--teal);
    border-radius: 100px;
    padding: 0.4rem 1rem;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 2rem;
  }
  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(3.5rem, 6vw, 6.5rem);
    font-weight: 600;
    line-height: 1.0;
    letter-spacing: -0.02em;
    margin-bottom: 1.5rem;
  }
  .hero-title .name-italic { font-style: italic; color: var(--teal); }
  .hero-desc {
    font-size: 1.05rem;
    color: var(--ink-mid);
    line-height: 1.75;
    max-width: 460px;
    margin-bottom: 2.5rem;
  }
  .hero-actions { display: flex; align-items: center; gap: 1.5rem; }
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--ink);
    color: var(--white);
    padding: 0.85rem 2rem;
    border-radius: 100px;
    font-size: 0.88rem;
    font-weight: 500;
    text-decoration: none;
    transition: background 0.25s, transform 0.15s, box-shadow 0.25s;
  }
  .btn-primary:hover { background: var(--teal); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(37,96,122,0.25); }
  .btn-secondary {
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--ink-mid);
    text-decoration: none;
    border-bottom: 1px solid var(--ink-mid);
    padding-bottom: 1px;
    transition: color 0.2s, border-color 0.2s;
  }
  .btn-secondary:hover { color: var(--teal); border-color: var(--teal); }

  /* Hero visual */
  .hero-visual {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 520px;
  }
  .hero-visual-bg {
    position: absolute;
    width: 460px;
    height: 460px;
    background: var(--teal-light);
    border-radius: 50% 40% 60% 40% / 40% 60% 40% 60%;
    opacity: 0.6;
    animation: morphBlob 8s ease-in-out infinite;
  }
  @keyframes morphBlob {
    0%,100% { border-radius: 50% 40% 60% 40% / 40% 60% 40% 60%; }
    33% { border-radius: 60% 40% 50% 50% / 60% 30% 70% 40%; }
    66% { border-radius: 40% 60% 40% 60% / 50% 60% 40% 50%; }
  }
  .hero-svg-wrap {
    position: relative;
    z-index: 1;
    animation: floatUp 5s ease-in-out infinite;
  }
  @keyframes floatUp {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  /* SECTION LABEL */
  .section-label {
    display: flex;
    align-items: center;
    gap: 1rem;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 3rem;
  }
  .section-label::after {
    content: '';
    flex: 1;
    max-width: 80px;
    height: 1px;
    background: var(--ink-light);
    opacity: 0.5;
  }

  /* ABOUT */
  #about { padding: 8rem 5vw; background: var(--white); }
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6rem;
    align-items: start;
    max-width: 1200px;
    margin: 0 auto;
  }
  .about-left h2 {
    font-family: var(--font-display);
    font-size: clamp(2.4rem, 4vw, 3.8rem);
    font-weight: 600;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 2rem;
  }
  .about-left p { font-size: 1rem; color: var(--ink-mid); line-height: 1.8; margin-bottom: 1.2rem; }

  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-top: 3rem; }
  .stat-card {
    background: var(--cream);
    border-radius: 16px;
    padding: 1.5rem 1.2rem;
    border: 1px solid rgba(0,0,0,0.05);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .stat-card:hover { transform: translateY(-4px); box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
  .stat-num { font-family: var(--font-display); font-size: 2.4rem; font-weight: 600; color: var(--teal); line-height: 1; margin-bottom: 0.4rem; }
  .stat-label { font-size: 0.78rem; color: var(--ink-light); line-height: 1.4; }

  .skills-group { margin-bottom: 2.5rem; }
  .skills-group-title { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-light); margin-bottom: 0.8rem; }
  .skill-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .skill-tag {
    display: inline-block;
    background: var(--cream);
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 100px;
    padding: 0.4rem 1rem;
    font-size: 0.83rem;
    color: var(--ink-mid);
    transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.15s;
    cursor: default;
  }
  .skill-tag:hover { background: var(--teal); color: var(--white); border-color: var(--teal); transform: translateY(-2px); }

  .skill-bar-row { display: flex; flex-direction: column; gap: 1rem; }
  .skill-bar-header { display: flex; justify-content: space-between; font-size: 0.83rem; color: var(--ink-mid); margin-bottom: 0.4rem; font-weight: 500; }
  .skill-bar-track { height: 4px; background: var(--cream-dark); border-radius: 100px; overflow: hidden; }
  .skill-bar-fill { height: 100%; background: var(--teal); border-radius: 100px; transform: scaleX(0); transform-origin: left; transition: transform 1s cubic-bezier(0.4,0,0.2,1); }
  .skill-bar-fill.animated { transform: scaleX(1); }

  /* PROJECTS */
  #projects { padding: 8rem 5vw; background: var(--cream); }
  .projects-header { display: flex; align-items: flex-end; justify-content: space-between; max-width: 1200px; margin: 0 auto 4rem; flex-wrap: wrap; gap: 1rem; }
  .projects-header h2 { font-family: var(--font-display); font-size: clamp(2.4rem, 4vw, 3.8rem); font-weight: 600; line-height: 1.1; letter-spacing: -0.02em; }
  .projects-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; max-width: 1200px; margin: 0 auto; }

  .project-card {
    background: var(--white);
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid rgba(0,0,0,0.05);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), box-shadow 0.3s;
    cursor: default;
  }
  .project-card:hover { transform: translateY(-8px); box-shadow: 0 24px 48px rgba(0,0,0,0.1); }
  .project-card.featured { grid-column: span 2; }

  .project-thumb { width: 100%; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; }
  .project-card.featured .project-thumb { aspect-ratio: 21/9; }
  .blue-bg  { background: #ddeaf0; }
  .green-bg { background: #d6ebe4; }
  .sand-bg  { background: #ede8dc; }

  .project-body { padding: 1.5rem 1.8rem 1.8rem; }
  .project-meta { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--teal); margin-bottom: 0.6rem; }
  .project-title { font-family: var(--font-display); font-size: 1.4rem; font-weight: 600; line-height: 1.2; margin-bottom: 0.8rem; color: var(--ink); }
  .project-desc { font-size: 0.88rem; color: var(--ink-light); line-height: 1.7; }
  .project-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 1.2rem; padding-top: 1rem; border-top: 1px solid rgba(0,0,0,0.06); }
  .project-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .project-tag-sm { font-size: 0.7rem; padding: 0.25rem 0.6rem; background: var(--cream); border-radius: 100px; color: var(--ink-mid); }
  .project-arrow { width: 32px; height: 32px; border-radius: 50%; background: var(--teal-light); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s; }
  .project-card:hover .project-arrow { background: var(--teal); }
  .project-card:hover .project-arrow svg path { stroke: white; }

  /* CONTACT */
  #contact { background: var(--ink); color: var(--white); padding: 6rem 5vw; text-align: center; }
  #contact .section-label { justify-content: center; color: rgba(255,255,255,0.35); }
  #contact .section-label::after { background: rgba(255,255,255,0.2); max-width: 40px; }
  #contact h2 { font-family: var(--font-display); font-size: clamp(2.5rem, 5vw, 5rem); font-weight: 600; line-height: 1.05; letter-spacing: -0.02em; margin-bottom: 1.5rem; }
  #contact h2 em { color: var(--teal-mid); font-style: italic; }
  #contact p { color: rgba(255,255,255,0.55); font-size: 1rem; max-width: 480px; margin: 0 auto 3rem; line-height: 1.7; }
  .contact-links { display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap; }
  .contact-btn { display: inline-flex; align-items: center; gap: 0.6rem; padding: 0.85rem 2rem; border-radius: 100px; font-size: 0.88rem; font-weight: 500; text-decoration: none; transition: transform 0.2s, box-shadow 0.2s; }
  .contact-btn:hover { transform: translateY(-3px); }
  .contact-btn.email { background: var(--teal); color: var(--white); }
  .contact-btn.email:hover { box-shadow: 0 8px 30px rgba(74,143,168,0.45); }
  .contact-btn.linkedin { background: rgba(255,255,255,0.1); color: var(--white); border: 1px solid rgba(255,255,255,0.15); }
  .contact-btn.linkedin:hover { background: rgba(255,255,255,0.18); }
  .contact-btn.resume { background: transparent; color: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.2); }
  .contact-btn.resume:hover { color: var(--white); border-color: rgba(255,255,255,0.5); }
  .footer-bottom { display: block; margin-top: 4rem; font-size: 0.78rem; color: rgba(255,255,255,0.25); }

  /* ANIMATIONS */
  .reveal { opacity: 0; transform: translateY(32px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }
  .reveal-delay-1 { transition-delay: 0.1s; }
  .reveal-delay-2 { transition-delay: 0.2s; }
  .reveal-delay-3 { transition-delay: 0.3s; }
  .reveal-delay-4 { transition-delay: 0.4s; }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    #hero { grid-template-columns: 1fr; padding-top: 80px; }
    .hero-visual { display: none; }
    .hero-bg-text { font-size: 30vw; }
    .about-grid { grid-template-columns: 1fr; gap: 3rem; }
    .projects-grid { grid-template-columns: 1fr; }
    .project-card.featured { grid-column: span 1; }
    .projects-header { flex-direction: column; align-items: flex-start; }
    .nav-cta { display: none; }
  }
  @media (max-width: 600px) {
    .stats-row { grid-template-columns: 1fr 1fr; }
    .hero-actions { flex-direction: column; align-items: flex-start; gap: 1rem; }
    nav { padding: 0 4vw; }
    #about, #projects { padding: 5rem 4vw; }
  }
</style>
</head>
<body>

<nav id="navbar">
  <a href="#hero" class="nav-logo">Tinesh Devakumar.</a>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#contact">Contact</a></li>
    <li><a href="#contact" class="nav-cta">Hire Me</a></li>
  </ul>
</nav>
